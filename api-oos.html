    // Hàm phụ trợ để sinh dữ liệu mẫu (mock data) từ JSON Schema
    function generateMockFromSchema(schemaRef, components) {
        if (!schemaRef) return {};
        let schema = schemaRef;

        // Xử lý tham chiếu $ref
        if (schema.$ref) {
            const refName = schema.$ref.split('/').pop();
            schema = components.schemas[refName] || {};
        }

        // Xử lý object
        if (schema.type === 'object' && schema.properties) {
            const mock = {};
            for (const key in schema.properties) {
                const prop = schema.properties[key];
                if (prop.example !== undefined) {
                    mock[key] = prop.example;
                } else if (prop.type === 'array' && prop.items) {
                    if (prop.items.$ref || prop.items.type === 'object') {
                        mock[key] = [generateMockFromSchema(prop.items, components)];
                    } else if (prop.example !== undefined) {
                        mock[key] = prop.example;
                    } else if (prop.items.example !== undefined) {
                        mock[key] = [prop.items.example];
                    } else {
                        mock[key] = prop.items.type === 'string' ? ["string"] : (prop.items.type === 'number' ? [0] : []);
                    }
                } else if (prop.$ref || prop.type === 'object') {
                    mock[key] = generateMockFromSchema(prop, components);
                } else {
                    mock[key] = prop.type === 'number' ? 0 : (prop.type === 'boolean' ? true : "string");
                }
            }
            return mock;
        } else if (schema.type === 'array' && schema.items) {
            return [generateMockFromSchema(schema.items, components)];
        }
        return {};
    }

    // Hàm gen code snippet tuỳ biến cho Redocly
    function injectCustomSnippets(spec, username, password) {
        // Encode ra Basic Auth
        const authString = (username || 'user') + ':' + (password || 'pass');
        const authEncoded = btoa(authString);
        const authHeader = `Basic ${authEncoded}`;
        const baseUrl = spec.servers[0].url;

        // Duyệt qua toàn bộ API paths để đắp code gen vào thuộc tính x-codeSamples
        for (const path in spec.paths) {
            for (const method in spec.paths[path]) {
                const op = spec.paths[path][method];
                let finalPath = path;
                let queryString = "";

                // Xử lý Parameters (Path & Query params)
                if (op.parameters && op.parameters.length > 0) {
                    // 1. Thay thế biến trên Path params (VD: {id})
                    op.parameters.filter(p => p.in === 'path').forEach(p => {
                        const val = (p.schema && p.schema.example !== undefined) ? p.schema.example : '123';
                        finalPath = finalPath.replace(`{${p.name}}`, val);
                    });

                    // 2. Gắn thêm Query params (VD: ?size=250&page=1)
                    const queryParams = op.parameters.filter(p => p.in === 'query');
                    if (queryParams.length > 0) {
                        const qs = queryParams.map(p => {
                            const val = (p.schema && p.schema.default !== undefined)
                                ? p.schema.default
                                : (p.schema && p.schema.example !== undefined ? p.schema.example : 'value');
                            return `${p.name}=${val}`;
                        }).join('&');
                        queryString = `?${qs}`;
                    }
                }

                const fullUrl = baseUrl + finalPath + queryString;
                const isWriteMethod = ['post', 'put', 'patch'].includes(method.toLowerCase());

                // Xử lý Request Body Payload
                let requestBodyJson = "{}";
                let requestBodyCompact = "{}"; // Dùng riêng cho Java để tránh lỗi string nhiều dòng

                if (isWriteMethod && op.requestBody && op.requestBody.content && op.requestBody.content['application/json']) {
                    const schemaRef = op.requestBody.content['application/json'].schema;
                    const mockObj = generateMockFromSchema(schemaRef, spec.components);
                    requestBodyJson = JSON.stringify(mockObj, null, 2);
                    requestBodyCompact = JSON.stringify(mockObj);
                }

                // Format an toàn cho từng ngôn ngữ
                const curlSafeJson = requestBodyJson.replace(/'/g, "'\\''");
                const jsIndentJson = requestBodyJson.split('\n').map((l, i) => i > 0 ? `  ${l}` : l).join('\n');
                const javaEscapedJson = requestBodyCompact.replace(/"/g, '\\"');

                const curlBody = isWriteMethod ? ` \\\n  -d '${curlSafeJson}'` : '';
                const nodeBody = isWriteMethod ? `,\n  data: ${jsIndentJson}` : '';
                const javaBodyDef = isWriteMethod
                    ? `String jsonPayload = "${javaEscapedJson}";\nRequestBody body = RequestBody.create(MediaType.parse("application/json"), jsonPayload);`
                    : ``;
                const javaReqBuilder = isWriteMethod ? `.${method.toLowerCase()}(body)` : `.${method.toLowerCase()}()`;
                const goPayload = isWriteMethod ? `strings.NewReader(\`${requestBodyJson}\`)` : `nil`;

                op['x-codeSamples'] = [
                    {
                        lang: 'cURL',
                        source: `curl -X ${method.toUpperCase()} "${fullUrl}" \\\n  -H "Authorization: ${authHeader}" \\\n  -H "Content-Type: application/json"${curlBody}`
                    },
                    {
                        lang: 'Node.js',
                        source: `const axios = require('axios');\n\naxios({\n  method: '${method}',\n  url: '${fullUrl}',\n  headers: {\n    'Authorization': '${authHeader}',\n    'Content-Type': 'application/json'\n  }${nodeBody}\n})\n.then(response => console.log(response.data));`
                    },
                    {
                        lang: 'Java',
                        source: `OkHttpClient client = new OkHttpClient();\n\n${javaBodyDef}\nRequest request = new Request.Builder()\n  .url("${fullUrl}")\n  ${javaReqBuilder}\n  .addHeader("Authorization", "${authHeader}")\n  .addHeader("Content-Type", "application/json")\n  .build();\n\nResponse response = client.newCall(request).execute();`
                    },
                    {
                        lang: 'Go',
                        source: `package main\n\nimport (\n\t"fmt"\n\t"net/http"\n\t"io/ioutil"\n\t"strings"\n)\n\nfunc main() {\n\turl := "${fullUrl}"\n\tpayload := ${goPayload}\n\n\treq, _ := http.NewRequest("${method.toUpperCase()}", url, payload)\n\treq.Header.Add("Authorization", "${authHeader}")\n\treq.Header.Add("Content-Type", "application/json")\n\n\tres, _ := http.DefaultClient.Do(req)\n\tdefer res.Body.Close()\n\tbody, _ := ioutil.ReadAll(res.Body)\n\tfmt.Println(string(body))\n}`
                    }
                ];
            }
        }
        return spec;
    }

    // Khởi tạo/Cập nhật Redoc
    function updateRedoc() {
        const user = document.getElementById('auth-user').value;
        const pass = document.getElementById('auth-pass').value;

        // Clone spec để không làm hỏng dữ liệu gốc
        const clonedSpec = JSON.parse(JSON.stringify(rawApiSpec));
        const specWithSnippets = injectCustomSnippets(clonedSpec, user, pass);

        Redoc.init(specWithSnippets, {
            scrollYOffset: 60,
            hideDownloadButton: true,
            theme: {
                colors: { primary: { main: '#2563eb' } },
                typography: { fontFamily: '"Nunito Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' },
                rightPanel: { backgroundColor: '#1e293b' }
            }
        }, document.getElementById('redoc-container'));
    }

    // Chạy lần đầu tiên khi tải trang
    window.onload = updateRedoc;
</script>
