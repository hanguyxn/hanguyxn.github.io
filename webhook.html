    /* Custom animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.3s ease-out forwards;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

</head>
<body class="bg-gray-50 text-gray-900 font-sans h-screen overflow-hidden flex">

<!-- Mobile Menu Button -->
<button id="mobile-menu-btn" class="md:hidden fixed bottom-4 right-4 z-50 bg-indigo-600 text-white p-3 rounded-full shadow-lg">

</button>

<!-- Overlay for mobile menu -->
<div id="mobile-overlay" class="fixed inset-0 bg-black/20 z-30 hidden md:hidden"></div>

<!-- SIDEBAR -->

          </div>

        </div>

        <div id="tab-content-container">
          <!-- Nội dung tab sẽ được render ở đây -->
        </div>
      </div>
    </div>

</div>

  // --- STATE ---
  let activeId = webhookData[0].id;
  let activeTab = 'schema'; // 'schema' | 'example' | 'curl'
  let isMobileMenuOpen = false;

  // --- UTILS & RENDERING ---

  function getActiveWebhook() {
    return webhookData.find(w => w.id === activeId);
  }

  function formatJSON(jsonStr) {
    try {
      const parsed = JSON.parse(jsonStr);
      return JSON.stringify(parsed, null, 2);
    } catch (e) {
      return jsonStr;
    }
  }

  // Tạo chuỗi cURL
  function generateCurlString() {
    const activeWebhook = getActiveWebhook();
    if (!activeWebhook) return '';
    let payload = '{}';
    try {
      payload = JSON.stringify(JSON.parse(activeWebhook.payload_example), null, 2);
    } catch (e) {
      payload = activeWebhook.payload_example;
    }
    return `curl -X POST https://your-domain.com/webhook/endpoint \\
  -H "Content-Type: application/json" \\
  -H "X-Webhook-Event: ${activeWebhook.event_name}" \\
  -d '${payload}'`;
  }

  // Hàm sao chép mã
  window.copyToClipboard = function(btnElement, textToCopy) {
    // Cách dùng element tạm thời để hỗ trợ tốt hơn
    const el = document.createElement('textarea');
    el.value = textToCopy;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);

    // Đổi UI button
    const originalHTML = btnElement.innerHTML;
    btnElement.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5 text-green-400"></i> Copied!`;
    lucide.createIcons(); // Re-render icon

    setTimeout(() => {
      btnElement.innerHTML = originalHTML;
      lucide.createIcons();
    }, 2000);
  };

    const encodedForJS = encodeURIComponent(formattedCode);

    return `
            <div class="relative group animate-fade-in-up">
                <div class="absolute right-4 top-4">
                    <button 
                        onclick="copyToClipboard(this, decodeURIComponent('${encodedForJS}'))"
                        class="p-2 bg-gray-800 text-gray-300 hover:text-white rounded-md transition-all flex items-center gap-2 text-xs"
                    >
                        <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy
                    </button>
                </div>
                <pre class="bg-[#1e1e2e] text-[#cdd6f4] p-6 rounded-xl overflow-x-auto text-sm font-mono shadow-inner border border-gray-800"><code>${escapedCode}</code></pre>
            </div>
            `;
  }

  // Hàm đệ quy render cấu trúc Schema
  function generateSchemaHTML(name, schema, isRequired, level = 0) {
    if (!schema) return '';

    const type = Array.isArray(schema.type) ? schema.type.join(' | ') : (schema.type || (schema.properties ? 'object' : 'any'));
    const hasChildren = type === 'object' && schema.properties;
    const isArray = type === 'array' && schema.items;

    let html = `<div class="font-mono text-sm">`;
    const paddingLeft = level * 24;

    html += `
            <div class="flex items-start py-2 border-b border-gray-100 hover:bg-gray-50 transition-colors">
                <div style="padding-left: ${paddingLeft}px; width: 100%" class="flex flex-col md:flex-row md:items-center gap-2">
                    
                    <div class="flex items-center w-full md:w-1/3 shrink-0">
                        ${level > 0 ? `<div class="w-4 h-4 border-b border-l border-gray-300 mr-2 -mt-4 opacity-50 rounded-bl-sm inline-block"></div>` : ''}
                        <span class="font-semibold text-gray-800">${name}</span>
                        ${isRequired ? `<span class="ml-2 text-[10px] uppercase font-bold tracking-wider text-red-500 bg-red-50 px-1.5 py-0.5 rounded">Required</span>` : ''}
                    </div>

                    <div class="w-full md:w-2/3 flex flex-col gap-1 text-gray-600">
                        <div class="flex flex-wrap items-center gap-2">
                            <span class="text-blue-600 bg-blue-50 px-2 py-0.5 rounded text-xs">${type}</span>
                            ${schema.format ? `<span class="text-purple-600 bg-purple-50 px-2 py-0.5 rounded text-xs border border-purple-100">format: ${schema.format}</span>` : ''}
                            ${schema.enum ? `<span class="text-amber-600 bg-amber-50 px-2 py-0.5 rounded text-xs border border-amber-100">enum: ${schema.enum.map(e => `"${e}"`).join(', ')}</span>` : ''}
                        </div>
                        ${schema.description ? `
                        <div class="text-gray-500 text-xs mt-1 bg-white p-2 border border-gray-100 rounded flex gap-2 items-start">
                            <i data-lucide="info" class="w-3.5 h-3.5 mt-0.5 text-gray-400 shrink-0"></i>
                            <span>${schema.description}</span>
                        </div>` : ''}
                    </div>

                </div>
            </div>`;

    // Đệ quy cho Object
    if (hasChildren) {
      html += `<div class="w-full">`;
      Object.entries(schema.properties).forEach(([key, childSchema]) => {
        const childIsRequired = schema.required && schema.required.includes(key);
        html += generateSchemaHTML(key, childSchema, childIsRequired, level + 1);
      });
      html += `</div>`;
    }

    // Đệ quy cho Array
    if (isArray) {
      html += `
                <div class="w-full">
                    <div style="padding-left: ${(level + 1) * 24}px" class="py-2 text-gray-400 text-xs italic flex items-center">
                        <div class="w-4 h-4 border-b border-l border-gray-300 mr-2 -mt-2 opacity-50 rounded-bl-sm"></div>
                        Array items structure:
                    </div>
                    ${generateSchemaHTML("[Item]", schema.items, true, level + 1)}
                </div>`;
    }

    html += `</div>`;
    return html;
  }

  // --- CẬP NHẬT GIAO DIỆN (DOM) ---

  function renderSidebar() {
    const listEl = document.getElementById('webhook-list');
    listEl.innerHTML = webhookData.map(w => {
      const isActive = activeId === w.id;
      const btnClasses = isActive
              ? 'bg-indigo-50 border border-indigo-100 text-indigo-700 shadow-sm'
              : 'hover:bg-gray-50 text-gray-600 border border-transparent';
      const eventNameClasses = isActive ? 'text-indigo-400' : 'text-gray-400';

      return `
                <li>
                    <button
                        onclick="handleSelectWebhook(${w.id})"
                        class="w-full text-left px-4 py-3 rounded-lg text-sm transition-all duration-200 flex flex-col gap-1 ${btnClasses}"
                    >
                        <span class="font-medium truncate">${w.display_name}</span>
                        <span class="text-xs font-mono truncate ${eventNameClasses}">${w.event_name}</span>
                    </button>
                </li>
                `;
    }).join('');
  }

  function renderMainContent() {
    const activeWebhook = getActiveWebhook();
    const mainContentEl = document.getElementById('main-content');
    const emptyStateEl = document.getElementById('empty-state');

    if (!activeWebhook) {
      mainContentEl.classList.add('hidden');
      emptyStateEl.classList.remove('hidden');
      return;
    }

    // Show content, hide empty state
    mainContentEl.classList.remove('hidden');
    emptyStateEl.classList.add('hidden');

    // Cập nhật Header
    document.getElementById('webhook-event-name').innerText = activeWebhook.event_name;
    document.getElementById('webhook-display-name').innerText = activeWebhook.display_name;
    document.getElementById('webhook-description').innerText = activeWebhook.description;
    document.getElementById('webhook-code').innerText = activeWebhook.code;
    document.getElementById('webhook-id').innerText = activeWebhook.id;

    const sectionContainer = document.getElementById('webhook-section-title-container');
    const sectionTitle = document.getElementById('webhook-section-title');
    if (activeWebhook.section_title) {
      sectionTitle.innerText = activeWebhook.section_title;
      sectionContainer.classList.remove('hidden');
    } else {
      sectionContainer.classList.add('hidden');
    }

    // Cập nhật trạng thái Tabs Header
    const tabBtns = ['schema', 'example', 'curl'];
    tabBtns.forEach(tab => {
      const btn = document.getElementById(`tab-btn-${tab}`);
      if (tab === activeTab) {
        btn.className = "px-5 py-3 text-sm font-medium flex items-center gap-2 border-b-2 transition-colors whitespace-nowrap border-indigo-600 text-indigo-600";
      } else {
        btn.className = "px-5 py-3 text-sm font-medium flex items-center gap-2 border-b-2 transition-colors whitespace-nowrap border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300";
      }
    });

    // Cập nhật Nội dung Tab
    const contentContainer = document.getElementById('tab-content-container');

    if (activeTab === 'schema') {
      let parsedSchema = null;
      try {
        parsedSchema = JSON.parse(activeWebhook.payload_schema);
      } catch (e) {
        console.error("Parse schema error:", e);
      }

      if (parsedSchema) {
        contentContainer.innerHTML = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden animate-fade-in-up">
                        <div class="p-4 bg-gray-50/50 border-b border-gray-100 flex justify-between items-center text-sm text-gray-500 font-medium">
                            <span>Thuộc tính</span>
                            <span>Kiểu dữ liệu</span>
                        </div>
                        <div class="p-2 md:p-4">
                            ${generateSchemaHTML('payload (root)', parsedSchema, true)}
                        </div>
                    </div>
                    `;
      } else {
        contentContainer.innerHTML = `
                    <div class="text-red-500 p-4 bg-red-50 rounded animate-fade-in-up">
                        Lỗi: Không thể phân tích chuỗi payload_schema. Hãy kiểm tra định dạng JSON.
                    </div>`;
      }
    }
    else if (activeTab === 'example') {
      contentContainer.innerHTML = renderCodeBlock(activeWebhook.payload_example);
    }
    else if (activeTab === 'curl') {
      contentContainer.innerHTML = `
                <div class="animate-fade-in-up">
                    <div class="mb-4 text-sm text-gray-600 bg-blue-50 p-3 rounded-lg border border-blue-100 flex items-start gap-2">
                        <i data-lucide="info" class="w-4 h-4 text-blue-500 mt-0.5 shrink-0"></i>
                        <div>
                            Dưới đây là ví dụ lệnh <strong>cURL</strong> mô phỏng request mà hệ thống sẽ gửi đến endpoint của bạn.
                        </div>
                    </div>
                    ${renderCodeBlock(generateCurlString())}
                </div>
                `;
    }

    // Khởi tạo lại icons sau khi cập nhật DOM
    setTimeout(() => {
      lucide.createIcons();
    }, 0);
  }

  // --- XỬ LÝ SỰ KIỆN ---

  window.handleSelectWebhook = function(id) {
    activeId = id;
    activeTab = 'schema'; // Reset tab
    isMobileMenuOpen = false;
    updateMobileMenuState();
    renderSidebar();
    renderMainContent();
  };

  window.setActiveTab = function(tab) {
    activeTab = tab;
    renderMainContent(); // Re-render main content để hiển thị tab mới
  };

  function toggleMobileMenu() {
    isMobileMenuOpen = !isMobileMenuOpen;
    updateMobileMenuState();
  }

  function updateMobileMenuState() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobile-overlay');

    if (isMobileMenuOpen) {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
    } else {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
    }
  }

  // Init App
  document.getElementById('mobile-menu-btn').addEventListener('click', toggleMobileMenu);
  document.getElementById('mobile-overlay').addEventListener('click', toggleMobileMenu);

  // Khởi động render
  renderSidebar();
  renderMainContent();

</script>
</body>
</html>
